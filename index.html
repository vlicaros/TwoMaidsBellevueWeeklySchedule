<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Schedule – Two Maids Bellevue</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');
:root{--pink:#e57dad;--pink-dark:#c45d8d;--pink-pale:#fdf0f7;--pink-border:#f0d6e8;--green:#2a9e82;--green-pale:#f0f9f6;--text:#1a1a2e;--muted:#6b7280;--light:#f7f3f8;--white:#fff;--border:#e8e0ee;--r:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--light);color:var(--text);min-height:100vh;padding-bottom:3rem}
.header{background:var(--white);border-bottom:3px solid var(--pink);padding:.875rem 1.25rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(229,125,173,.12)}
.hdot{width:9px;height:9px;border-radius:50%;background:var(--pink);flex-shrink:0}
.htitle{font-size:.9rem;font-weight:600;flex:1}
.hbadge{font-size:.7rem;font-family:'DM Mono',monospace;color:var(--pink);background:var(--pink-pale);padding:.2rem .6rem;border-radius:100px;border:1px solid var(--pink-border)}
.container{max-width:480px;margin:0 auto;padding:1.25rem 1rem}
.profile-card{background:var(--white);border-radius:var(--r);border:1px solid var(--pink-border);padding:1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;box-shadow:var(--shadow)}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--pink);color:var(--white);font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pname{font-size:1.2rem;font-weight:600;line-height:1.2}
.pweek{font-size:.8rem;color:var(--muted);margin-top:3px}
.pstats{display:flex;gap:.75rem;margin-top:6px;flex-wrap:wrap}
.spill{font-size:.72rem;font-weight:600;padding:.2rem .6rem;border-radius:100px}
.s-jobs{background:var(--pink-pale);color:var(--pink-dark)}
.s-total{background:var(--green-pale);color:var(--green)}
.day-group{margin-bottom:1.25rem}
.day-header{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.5rem;padding:0 .25rem}
.day-name{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pink)}
.day-date{font-size:.72rem;font-family:'DM Mono',monospace;color:var(--muted)}
.job-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:.625rem;box-shadow:var(--shadow)}
.job-accent{height:3px;background:var(--pink)}
.job-body{padding:.875rem 1rem}
.job-customer{font-size:1rem;font-weight:600;margin-bottom:.25rem;line-height:1.3}
.job-address{font-size:.82rem;color:var(--muted);line-height:1.4;margin-bottom:.625rem}
.maps-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem;font-weight:600;color:var(--pink-dark);text-decoration:none;background:var(--pink-pale);border:1px solid var(--pink-border);border-radius:100px;padding:.3rem .75rem;margin-bottom:.75rem}
.maps-btn svg{width:13px;height:13px;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:.625rem 0}
.pills{display:flex;flex-wrap:wrap;gap:.4rem}
.pill{font-size:.72rem;font-family:'DM Mono',monospace;padding:.25rem .6rem;border-radius:100px;border:1px solid transparent;white-space:nowrap}
.p-def{background:#f3f0f7;color:#555;border-color:#e2dcea}
.p-time{background:var(--pink-pale);color:var(--pink-dark);border-color:var(--pink-border)}
.p-price{background:var(--green-pale);color:var(--green);border-color:#c8ead9}
.p-pay{background:#fefbe8;color:#92700a;border-color:#f0e5a0}
.state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.state-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4}
.state h2{font-size:1rem;font-weight:600;margin-bottom:.4rem;color:var(--text)}
.state p{font-size:.85rem;line-height:1.6}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:1rem}
.spinner{width:32px;height:32px;border:3px solid var(--pink-border);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:.85rem;color:var(--muted)}
.updated-bar{font-size:.72rem;font-family:'DM Mono',monospace;color:var(--muted);text-align:center;padding:.5rem;margin-bottom:.75rem}
footer{text-align:center;padding:1.5rem 1rem 0;font-size:.72rem;color:#b0a8bb;font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div class="header">
  <div class="hdot"></div>
  <span class="htitle">Two Maids – Bellevue</span>
  <span class="hbadge" id="hbadge">Schedule</span>
</div>

<div class="container">
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading your schedule…</p>
    </div>
  </div>
  <footer>Two Maids Cleaning · Bellevue, WA</footer>
</div>

<script>
(function(){
  var DAY_ORDER = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  function ini(n){ return n.split(/[\/\s]+/).filter(Boolean).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2); }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Read ?cleaner=name from URL
  var params = new URLSearchParams(location.search);
  var cleanerParam = (params.get('cleaner')||'').trim().toLowerCase();

  if (!cleanerParam) {
    showError('No cleaner specified','This link is missing the cleaner name.<br>Ask your manager for your personal schedule link.');
    return;
  }

  // JSON_URL is replaced by the admin tool when generating the schedules file
  // It points to the raw schedules.json on your GitHub repo
  var JSON_URL = params.get('src') || 'https://raw.githubusercontent.com/vlicaros/TwoMaidsBellevueWeeklySchedule/main/schedules.json';

  /*if (JSON_URL === 'https://raw.githubusercontent.com/vlicaros/TwoMaidsBellevueWeeklySchedule/main/schedules.json') {
    showError('Not configured','The viewer page has not been configured yet.<br>Contact your manager.');
    return;
  }*/

  // Fetch the schedule JSON (cache-busted so cleaners always get latest)
  fetch(JSON_URL + '?t=' + Date.now())
    .then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data){
      // data = { week: "...", updated: "...", cleaners: { "megan": [...], "nick": [...] } }
      var key = cleanerParam;
      var cleanerJobs = data.cleaners && data.cleaners[key];

      if (!cleanerJobs) {
        // Try case-insensitive match
        var found = Object.keys(data.cleaners||{}).find(function(k){ return k.toLowerCase()===key; });
        if (found) cleanerJobs = data.cleaners[found];
      }

      // Capitalise name for display
      var displayName = cleanerParam.charAt(0).toUpperCase() + cleanerParam.slice(1);

      if (!cleanerJobs || !cleanerJobs.length) {
        document.getElementById('hbadge').textContent = data.week || 'This Week';
        showNoJobs(displayName, data.week);
        return;
      }

      renderSchedule(displayName, data.week, data.updated, cleanerJobs);
    })
    .catch(function(e){
      showError('Could not load schedule','Unable to fetch schedule data.<br>Try refreshing in a moment, or contact your manager.<br><small style="font-family:monospace;font-size:.75rem;opacity:.6">'+e.message+'</small>');
    });

  function renderSchedule(name, week, updated, jobs) {
    document.title = name + "'s Schedule – Two Maids";
    document.getElementById('hbadge').textContent = week || 'This Week';

    var byDay = {};
    jobs.forEach(function(j){ if(!byDay[j.day])byDay[j.day]=[]; byDay[j.day].push(j); });
    var days = DAY_ORDER.filter(function(d){ return byDay[d]; });
    var total = jobs.reduce(function(s,j){ return s+(parseFloat(j.price)||0); },0);

    var html = '';

    // Profile card
    html += '<div class="profile-card">';
    html += '<div class="avatar">'+ini(name)+'</div>';
    html += '<div><div class="pname">'+esc(name)+'</div>';
    if (week) html += '<div class="pweek">'+esc(week)+'</div>';
    html += '<div class="pstats">';
    html += '<span class="spill s-jobs">'+jobs.length+' job'+(jobs.length!==1?'s':'')+'</span>';
    if (total>0) html += '<span class="spill s-total">$'+total.toLocaleString()+' total</span>';
    html += '</div></div></div>';

    if (updated) html += '<div class="updated-bar">Last updated: '+esc(updated)+'</div>';

    days.forEach(function(day){
      var dJobs = byDay[day];
      var dateStr = dJobs[0]&&dJobs[0].date ? dJobs[0].date : '';
      html += '<div class="day-group">';
      html += '<div class="day-header"><span class="day-name">'+day+'</span>';
      if (dateStr) html += '<span class="day-date">'+esc(dateStr)+'</span>';
      html += '</div>';
      dJobs.forEach(function(j){
        var mapUrl = j.address ? 'https://maps.google.com/?q='+encodeURIComponent(j.address) : '';
        html += '<div class="job-card"><div class="job-accent"></div><div class="job-body">';
        html += '<div class="job-customer">'+esc(j.customer)+'</div>';
        if (j.address) html += '<div class="job-address">'+esc(j.address)+'</div>';
        if (mapUrl) html += '<a class="maps-btn" href="'+mapUrl+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Open in Maps</a>';
        html += '<div class="divider"></div><div class="pills">';
        if (j.time)    html += '<span class="pill p-time">⏰ '+esc(j.time)+'</span>';
        if (j.package) html += '<span class="pill p-def">'+esc(j.package)+'</span>';
        if (j.price)   html += '<span class="pill p-price">$'+esc(String(j.price))+'</span>';
        if (j.payment) html += '<span class="pill p-pay">'+esc(j.payment)+'</span>';
        html += '</div></div></div>';
      });
      html += '</div>';
    });

    document.getElementById('app').innerHTML = html;
  }

  function showNoJobs(name, week) {
    document.getElementById('app').innerHTML =
      '<div class="profile-card"><div class="avatar">'+ini(name)+'</div><div><div class="pname">'+esc(name)+'</div>'+(week?'<div class="pweek">'+esc(week)+'</div>':'')+'</div></div>'+
      '<div class="state"><div class="state-icon">☀️</div><h2>No jobs this week</h2><p>You have no scheduled appointments for this week.<br>Check back after your manager updates the schedule.</p></div>';
  }

  function showError(title, msg) {
    document.getElementById('app').innerHTML =
      '<div class="state"><div class="state-icon">📋</div><h2>'+esc(title)+'</h2><p>'+msg+'</p></div>';
  }
})();
</script>
</body>
</html>
